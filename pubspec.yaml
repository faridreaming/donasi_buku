name: donasi_buku
description: Platform Hibah Buku Bekas
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.30.1
  firebase_auth: ^4.19.6
  cloud_firestore: ^4.17.5
  firebase_messaging: ^14.9.4

  flutter_dotenv: ^5.1.0
  http: ^1.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  go_router: ^13.2.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  timeago: ^3.7.0
  shared_preferences: ^2.2.3
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
